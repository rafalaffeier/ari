version: "2.1"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT}:8000"
    environment:
      ENV: staging
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://ari.flusscreative.com}
      EMAIL_FROM: ${EMAIL_FROM:-ARI <no-reply@flusscreative.com>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      DUFFEL_ACCESS_TOKEN: ${DUFFEL_ACCESS_TOKEN:-}
      DUFFEL_API_BASE_URL: ${DUFFEL_API_BASE_URL:-https://api.duffel.com}
      DUFFEL_API_VERSION: ${DUFFEL_API_VERSION:-v2}
      DUFFEL_TEST_MODE: ${DUFFEL_TEST_MODE:-true}
      AI_MODEL: ${AI_MODEL}
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD}
      SYNC_STORAGE_BACKEND: local
      SYNC_STORAGE_ROOT: /data/sync
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS}
    volumes:
      - syncdata:/data/sync
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    restart: unless-stopped
    command: celery -A app.jobs.celery_app worker --loglevel=info
    environment:
      ENV: staging
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://ari.flusscreative.com}
      EMAIL_FROM: ${EMAIL_FROM:-ARI <no-reply@flusscreative.com>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      DUFFEL_ACCESS_TOKEN: ${DUFFEL_ACCESS_TOKEN:-}
      DUFFEL_API_BASE_URL: ${DUFFEL_API_BASE_URL:-https://api.duffel.com}
      DUFFEL_API_VERSION: ${DUFFEL_API_VERSION:-v2}
      DUFFEL_TEST_MODE: ${DUFFEL_TEST_MODE:-true}
      AI_MODEL: ${AI_MODEL}
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD}
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  redisdata:
  syncdata:
