name: ai-assistant

services:
  db:
    image: postgres:16-alpine
    container_name: ai-assistant-db
    environment:
      POSTGRES_DB: ai_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-assistant-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: ai-assistant-backend
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/.env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_assistant
      REDIS_URL: redis://redis:6379/0
      SYNC_STORAGE_BACKEND: local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - syncdata:/app/data/sync
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    container_name: ai-assistant-worker
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    command: celery -A app.jobs.celery_app worker --loglevel=info
    env_file:
      - ../../backend/.env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_assistant
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  syncdata:
